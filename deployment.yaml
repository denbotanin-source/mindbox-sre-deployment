# Deployment для веб-приложения в мультизональном кластере
# Учтены все условия задания: долгий старт, CPU всплеск, память 128M,
# дневной цикл, отказоустойчивость, минимальное потребление ресурсов
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mindbox-web
  labels:
    app: mindbox-web
spec:
  # Минимум 2 реплики для отказоустойчивости
  # Максимум 4 под контролем HPA (по условию: 4 пода выдерживают пик)
  replicas: 2
  selector:
    matchLabels:
      app: mindbox-web
  template:
    metadata:
      labels:
        app: mindbox-web
    spec:
      # РАЗНОС ПОДОВ ПО НОДАМ (базовая отказоустойчивость)
      # Запрещаем двум подам нашего приложения попадать на одну ноду
      # Это защищает от отказа одной ноды — второй под продолжит работу
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: mindbox-web
            topologyKey: kubernetes.io/hostname
      
      containers:
      - name: app
        image: mindbox-web-app:latest
        ports:
        - containerPort: 8080
        
        # ПРОВЕРКА ГОТОВНОСТИ
        # Приложение инициализируется 5-10 секунд
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5   # ждём 5 секунд перед первой проверкой
        
        # ПРОВЕРКА ЖИВОСТИ
        # Даём больше времени (15 сек), чтобы не убить под во время старта
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
        
        # РЕСУРСЫ
        # Память: всегда 128M (по условию)
        # CPU: обычно 0.1, на старте нужно больше (ставим limits выше)
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"      # 0.1 ядра — обычное потребление
          limits:
            memory: "256Mi"  # небольшой запас (хотя по условию память всегда ровная)
            cpu: "300m"      # 0.3 ядра — запас на стартовый всплеск

---
# АВТОМАСШТАБИРОВАНИЕ
# Днём — нагрузка растёт, HPA добавит поды до 4
# Ночью — нагрузка падает, HPA уменьшит до 2 (экономия ресурсов)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mindbox-web-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mindbox-web
  minReplicas: 2      # даже ночью не меньше 2 (отказоустойчивость)
  maxReplicas: 4      # пиковая нагрузка (по результатам теста)
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70   # при загрузке CPU >70% добавим под